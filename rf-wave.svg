<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 40" width="100%" height="100%">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    .wave { fill: none; stroke: #3399ff; stroke-width: 2; animation: pulse 4s infinite ease-in-out; filter: url(#glow); }
  </style>
  <path class="wave" d="M 0 20 Q 25 0 50 20 T 100 20 T 150 20 T 200 20 T 250 20 T 300 20 T 350 20 T 400 20 T 450 20 T 500 20 T 550 20 T 600 20 T 650 20 T 700 20 T 750 20 T 800 20 T 850 20 T 900 20 T 950 20 T 1000 20"/>
</svg>
