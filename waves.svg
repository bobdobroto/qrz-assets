<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <style>
    @keyframes expand {
      0% { r: 10px; opacity: 1; stroke-width: 3; }
      100% { r: 250px; opacity: 0; stroke-width: 1; }
    }
    .wave { fill: none; stroke: #3399ff; animation: expand 4s infinite ease-out; }
    .w1 { animation-delay: 0s; }
    .w2 { animation-delay: 1.3s; }
    .w3 { animation-delay: 2.6s; }
  </style>
  <rect width="100%" height="100%" fill="#030407"/>
  <circle cx="400" cy="160" r="5" fill="#ffffff"/>
  <circle cx="400" cy="160" class="wave w1"/>
  <circle cx="400" cy="160" class="wave w2"/>
  <circle cx="400" cy="160" class="wave w3"/>
  <text x="400" y="80" fill="#ffffff" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" letter-spacing="6">LZ1BO</text>
  <text x="400" y="115" fill="#3399ff" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" letter-spacing="3">LISTENING TO THE UNIVERSE</text>
</svg>
